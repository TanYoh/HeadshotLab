<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS枪法训练</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" data-ui-size="small">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">FPS Aim Trainer</p>
          <h1 id="page-title">FPS枪法训练</h1>
          <p class="subtitle">设置训练节奏，在随机出现的目标上快速移动并点击</p>
        </div>

        <div class="score-card" aria-live="polite">
          <span>当前分数</span>
          <strong id="score">0</strong>
        </div>
      </section>

      <section class="layout">
        <aside class="panel" aria-label="游戏设置">
          <form id="settings-form" class="settings">
            <div class="setting-field">
              <span>游戏时长</span>
              <input id="duration" name="duration" type="hidden" value="60" />
              <div class="option-group" data-target="duration" role="group" aria-label="游戏时长">
                <button type="button" class="option-button is-active" data-value="60" aria-pressed="true">60s</button>
                <button type="button" class="option-button" data-value="120" aria-pressed="false">120s</button>
              </div>
            </div>

            <div class="setting-field">
              <span>出点间隔</span>
              <input id="interval" name="interval" type="hidden" value="medium" />
              <div class="option-group" data-target="interval" role="group" aria-label="出点间隔">
                <button type="button" class="option-button" data-value="slow" aria-pressed="false">慢</button>
                <button type="button" class="option-button is-active" data-value="medium" aria-pressed="true">中</button>
                <button type="button" class="option-button" data-value="fast" aria-pressed="false">快</button>
              </div>
            </div>

            <div class="setting-field">
              <span>界面大小</span>
              <input id="ui-size" name="uiSize" type="hidden" value="small" />
              <div class="option-group" data-target="ui-size" role="group" aria-label="界面大小">
                <button type="button" class="option-button is-active" data-value="small" aria-pressed="true">小</button>
                <button type="button" class="option-button" data-value="medium" aria-pressed="false">中</button>
                <button type="button" class="option-button" data-value="large" aria-pressed="false">大</button>
              </div>
            </div>

            <div class="actions">
              <button id="start-button" type="submit">开始训练</button>
              <button id="reset-button" type="button" class="secondary">重置</button>
            </div>
            <button id="open-guide-button" type="button" class="text-button guide-shortcut">查看计分说明</button>
          </form>

          <div class="stats" aria-label="实时数据">
            <div>
              <span>剩余时间</span>
              <strong id="time-left">60.0s</strong>
            </div>
            <div>
              <span>出现目标</span>
              <strong id="spawn-count">0</strong>
            </div>
            <div>
              <span>命中率</span>
              <strong id="accuracy">0%</strong>
            </div>
          </div>

          <section class="records" aria-labelledby="records-title">
            <div class="records-header">
              <h2 id="records-title">分数记录</h2>
              <button id="clear-records" type="button" class="text-button">清空</button>
            </div>
            <div class="records-groups">
              <section class="records-group records-group--recent" aria-labelledby="recent-records-title">
                <div class="records-subheader">
                  <h3 id="recent-records-title">最近 10 次</h3>
                </div>
                <ol id="recent-records-list" class="records-list"></ol>
              </section>
            </div>
          </section>
        </aside>

        <section class="game-shell" aria-label="训练区域">
          <div class="game-status" id="game-status">调整参数后点击开始训练</div>
          <section class="config-top3" aria-label="当前配置榜单">
            <div class="config-top3__header">
              <span id="active-config-label" class="config-top3__label"></span>
            </div>
            <ol id="active-top-records-list" class="config-top3__list"></ol>
          </section>
          <div id="game-area" class="game-area" tabindex="0" aria-label="目标出现区域"></div>
          <div id="start-guide" class="start-guide" hidden>
            <section
              class="start-guide__dialog"
              role="dialog"
              aria-modal="true"
              aria-labelledby="start-guide-title"
              aria-describedby="start-guide-desc"
            >
              <p class="start-guide__eyebrow">计分说明</p>
              <h2 id="start-guide-title">命中不同区域，分数不同</h2>
              <p id="start-guide-desc" class="start-guide__desc">
                点击越靠近靶心，得分越高。
              </p>
              <div id="score-guide-figure" class="start-guide__figure" aria-label="计分规则演示"></div>
              <label class="start-guide__toggle">
                <input id="guide-dismiss-toggle" type="checkbox" />
                <span>不再提示</span>
              </label>
              <div class="start-guide__actions">
                <button id="guide-cancel-button" type="button" class="secondary">返回调整</button>
                <button id="guide-start-button" type="button">我知道了，开始训练</button>
              </div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
